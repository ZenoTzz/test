<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一个可以自由布置棋盘、连续推动石头并躲避怪物的极简推箱子游戏。"
    />
    <title>石间 · 极简推箱子</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">7 × 8 GRID GAME</p>
          <h1>石间</h1>
          <p class="subtitle">推开石阵，避开怪物的警戒范围。</p>
        </div>
        <button class="icon-button" id="helpButton" type="button" aria-label="查看规则">?</button>
      </header>

      <section class="game-shell">
        <div class="status-row" aria-live="polite">
          <div>
            <span class="status-label">状态</span>
            <strong id="statusText">布置棋盘</strong>
          </div>
          <div class="stats">
            <span>步数 <strong id="stepCount">0</strong></span>
            <span>怪物 <strong id="monsterCount">0</strong></span>
          </div>
        </div>

        <div class="board-wrap">
          <div id="board" class="board" role="grid" aria-label="七行八列游戏棋盘"></div>
          <div id="resultPanel" class="result-panel" hidden>
            <p id="resultEyebrow">本局结束</p>
            <h2 id="resultTitle">被发现了</h2>
            <p id="resultMessage">你进入了怪物的警戒范围。</p>
            <button id="retryButton" class="primary-button" type="button">重新挑战</button>
          </div>
        </div>

        <section id="editorPanel" class="editor-panel" aria-label="棋盘编辑工具">
          <div class="tool-group" role="radiogroup" aria-label="选择放置内容">
            <button class="tool active" data-tool="player" type="button">
              <span class="mini-piece player-piece"></span>
              玩家
            </button>
            <button class="tool" data-tool="stone" type="button">
              <span class="mini-piece stone-piece"></span>
              石头
            </button>
            <button class="tool" data-tool="monster" type="button">
              <span class="mini-piece monster-piece"></span>
              怪物
            </button>
            <button class="tool" data-tool="beamMonster" type="button">
              <span class="mini-piece beam-monster-piece">↑</span>
              射线怪
            </button>
            <button class="tool" data-tool="erase" type="button">
              <span class="erase-mark">×</span>
              擦除
            </button>
          </div>
          <div id="directionPicker" class="direction-picker" hidden>
            <span>射线方向</span>
            <button class="direction-option active" data-facing="up" type="button">↑</button>
            <button class="direction-option" data-facing="right" type="button">→</button>
            <button class="direction-option" data-facing="down" type="button">↓</button>
            <button class="direction-option" data-facing="left" type="button">←</button>
          </div>
          <p class="editor-hint">选择角色后点击格子放置。棋盘上只能有一个玩家。</p>
        </section>

        <div class="actions">
          <button id="startButton" class="primary-button" type="button">开始游戏</button>
          <button id="editButton" class="secondary-button" type="button" hidden>编辑棋盘</button>
          <button id="resetButton" class="secondary-button" type="button">重置</button>
          <button id="clearButton" class="text-button" type="button">清空</button>
        </div>

        <div id="dpad" class="dpad" hidden aria-label="移动方向">
          <button data-direction="up" type="button" aria-label="向上">↑</button>
          <button data-direction="left" type="button" aria-label="向左">←</button>
          <button data-direction="down" type="button" aria-label="向下">↓</button>
          <button data-direction="right" type="button" aria-label="向右">→</button>
        </div>

        <p class="keyboard-hint">游戏中使用方向键或 W A S D 移动</p>
      </section>
    </main>

    <dialog id="helpDialog">
      <button class="dialog-close" id="closeHelpButton" type="button" aria-label="关闭">×</button>
      <p class="eyebrow">HOW TO PLAY</p>
      <h2>游戏规则</h2>
      <ol>
        <li>你可以推动面前所有连续的非怪物物体，但最后必须有空位。</li>
        <li>怪物不会移动且不可推动，棋盘开局必须恰好放置三个怪物。</li>
        <li>普通怪攻击上下左右相邻格；射线怪攻击正前方直到棋盘边界。</li>
        <li>三个怪物组成上下左右连通的一组时，会同时厮杀并全部死亡，此时获胜。</li>
      </ol>
      <button id="understoodButton" class="primary-button" type="button">明白了</button>
    </dialog>

    <script src="game.js"></script>
  </body>
</html>
